name: Upload Conda Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Conda Environment
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          activate-environment: build_env
          channels: conda-forge,defaults
          
      # Install Build Dependencies
      - name: Install Build Tools
        shell: bash -l {0}
        run: |
          conda install -n base -y conda-build
          conda install -y anaconda-client setuptools wheel hatchling pip

      # Build the Package
      - name: Build Conda Package
        shell: bash -l {0}
        run: |
          mkdir -p build_output
          conda build ./conda --output-folder ./build_output

      # Debug: List generated files (Helps verify where the file actually went)
      - name: Debug Build Output
        run: ls -R ./build_output

      # Upload to Anaconda
      - name: Upload to Anaconda
        shell: bash -l {0}
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
          ANACONDA_USER: davidusb
        run: |
          # Find the package file (targeting both .conda and .tar.bz2)
          PACKAGE_FILE=$(find ./build_output -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | head -n 1)

          # Safety check
          if [ -z "$PACKAGE_FILE" ]; then
            echo "::error::No conda package file (.conda or .tar.bz2) found!"
            ls -R ./build_output
            exit 1
          fi

          echo "Found package: $PACKAGE_FILE"

          # Upload
          anaconda -t $ANACONDA_TOKEN upload -u $ANACONDA_USER "$PACKAGE_FILE" --force
