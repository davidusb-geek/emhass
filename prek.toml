# prek.toml — local pre-commit hooks mirroring CI (code-quality.yml)
# https://prek.j178.dev/
#
# Install once:  prek install
# Run manually:  prek run --all-files

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12"

[[repos.hooks]]
id = "ruff"
args = ["--fix"]

[[repos.hooks]]
id = "ruff-format"
